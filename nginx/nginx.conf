# ============================================================================
# Nginx — Proxy inverso con terminación TLS
# ============================================================================
# Funciones:
#   - Terminación HTTPS con TLS 1.3 exclusivamente
#   - Redirección HTTP → HTTPS automática
#   - Proxy inverso hacia el backend FastAPI (puerto 8000)
#   - Servicio de ficheros estáticos del frontend Vue.js 3
#   - Cabeceras de seguridad y límites de subida de adjuntos
# ============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 256;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # --- Formato de log ---
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    # --- Rendimiento ---
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # --- Compresión ---
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    # --- Límite de tamaño para subida de adjuntos ---
    # Coincide con MAX_TRANSACTION_FILES_MB (50 MB como máximo por transacción)
    client_max_body_size 60m;

    # --- Cabeceras de seguridad globales ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- Resolver DNS interno de Docker para resolución dinámica ---
    # Permite que Nginx arranque aunque el backend no esté listo todavía
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ======================================================================
    # Servidor HTTP — Redirección a HTTPS
    # ======================================================================
    server {
        listen 80;
        server_name _;

        # Redirigir todo el tráfico HTTP a HTTPS
        return 301 https://$host$request_uri;
    }

    # ======================================================================
    # Servidor HTTPS — Terminación TLS
    # ======================================================================
    server {
        listen 443 ssl http2;
        server_name _;

        # --- Certificados TLS ---
        # Desarrollo: certificado autofirmado generado por scripts/generate-ssl.sh
        # Producción: certificados de Let's Encrypt montados en /etc/nginx/ssl
        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;

        # --- Configuración TLS ---
        # TLS 1.2 y 1.3. En producción se puede restringir a TLSv1.3 únicamente.
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;

        # --- Sesiones TLS ---
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # --- HSTS (solo en producción, activar manualmente) ---
        # add_header Strict-Transport-Security "max-age=63072000" always;

        # ------------------------------------------------------------------
        # Proxy inverso — API REST del backend
        # ------------------------------------------------------------------
        location /api/ {
            set $backend http://backend:8000;
            proxy_pass $backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts generosos para operaciones pesadas (importación Excel, informes PDF)
            proxy_connect_timeout 60s;
            proxy_send_timeout    120s;
            proxy_read_timeout    120s;
        }

        # ------------------------------------------------------------------
        # Proxy inverso — Endpoints de autenticación
        # ------------------------------------------------------------------
        location /auth/ {
            set $backend http://backend:8000;
            proxy_pass $backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ------------------------------------------------------------------
        # Proxy inverso — Endpoints de desarrollo (solo activos en ENV=development)
        # ------------------------------------------------------------------
        location /dev/ {
            set $backend http://backend:8000;
            proxy_pass $backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ------------------------------------------------------------------
        # Documentos OpenAPI (solo en desarrollo)
        # ------------------------------------------------------------------
        location /docs {
            set $backend http://backend:8000;
            proxy_pass $backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /openapi.json {
            set $backend http://backend:8000;
            proxy_pass $backend;
        }

        location /redoc {
            set $backend http://backend:8000;
            proxy_pass $backend;
            proxy_set_header Host $host;
        }

        # ------------------------------------------------------------------
        # Ficheros estáticos del frontend Vue.js 3
        # ------------------------------------------------------------------
        location = /index.html {
            root /usr/share/nginx/html;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            expires 0;
        }

        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # --- Cache de assets estáticos ---
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            root /usr/share/nginx/html;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # --- Manifest y Service Worker (PWA) sin cache agresiva ---
        location ~* (manifest\.json|service-worker\.js|sw\.js)$ {
            root /usr/share/nginx/html;
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }
}
